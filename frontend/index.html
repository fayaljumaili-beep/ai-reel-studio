<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    video {
      margin-top: 20px;
      width: 500px;
    }
  </style>
</head>
<body>

  <h1>🎬 AI Reel Generator</h1>

  <textarea id="prompt" placeholder="Type something like gym..."></textarea><br>

  <button id="generateBtn">Generate Video</button>

  <br>

  <video id="video" controls></video>

  <script>
    const button = document.getElementById("generateBtn");
    const video = document.getElementById("video");
    const textarea = document.getElementById("prompt");

    button.addEventListener("click", async () => {
      const prompt = textarea.value;

      console.log("Sending:", prompt);

      const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      console.log("Response:", data);

      video.pause();

video.src = data.videoUrl;
video.load();

video.play().catch(() => {
  console.log("Autoplay blocked (normal)");
});
    });
  </script>

</body>
</html>
