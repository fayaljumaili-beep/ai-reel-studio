<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      margin-top: 20px;
      width: 400px;
    }
  </style>
</head>

<body>

  <h1>🎬 AI Reel Generator</h1>

  <textarea placeholder="Type something like: gym, nature, motivation..."></textarea>
  <br>

  <button onclick="generateVideo()">Generate Video</button>

  <br><br>

  <video controls crossorigin="anonymous"></video>

  <script>
    async function generateVideo() {
  const prompt = document.querySelector("textarea").value;

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  const video = document.querySelector("video");

video.src = data.videoUrl;
video.crossOrigin = "anonymous"; // 👈 ADD THIS
video.muted = true;
video.playsInline = true;

video.load();

video.play().catch((e) => {
  console.log("Play blocked:", e);
});
}
  </script>

</body>
</html>
