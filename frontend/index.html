<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Generator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      margin-top: 20px;
      width: 400px;
      background: black;
    }
  </style>
</head>

<body>

  <h1>🎬 AI Reel Generator</h1>

  <textarea id="prompt" placeholder="Enter prompt..."></textarea><br>

  <button id="generateBtn">Generate Video</button>

  <br>

  <video id="videoPlayer" controls muted playsinline></video>

  <script>
    const button = document.getElementById("generateBtn");
    const video = document.getElementById("videoPlayer");

    button.addEventListener("click", async () => {
      try {
        const prompt = document.getElementById("prompt").value;

        console.log("Sending request...");

        const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        console.log("Response:", data);

        video.src = data.videoUrl;
        video.load();

        video.muted = true;
        video.playsInline = true;

        setTimeout(() => {
          video.play().catch(err => console.log("Autoplay blocked:", err));
        }, 100);

      } catch (err) {
        console.error("Error:", err);
      }
    });
  </script>

</body>
</html>
