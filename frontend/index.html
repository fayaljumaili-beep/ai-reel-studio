<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    video {
      margin-top: 20px;
      width: 500px;
    }
  </style>
</head>
<body>

  <h1>🎬 AI Reel Generator</h1>

  <textarea id="prompt" placeholder="Type something like gym..."></textarea><br>

  <button onclick="generateVideo()">Generate Video</button>

  <br>

  <video id="videoPlayer" autoplay muted playsinline></video>

 <script>
let videos = [];
let currentIndex = 0;

const videoPlayer = document.getElementById("videoPlayer");

function playNextVideo() {
  if (!videos.length) return;

  videoPlayer.src = videos[currentIndex];
  videoPlayer.play();

  currentIndex = (currentIndex + 1) % videos.length;
}

// when video ends → play next
videoPlayer.addEventListener("ended", playNextVideo);

async function generateVideo() {
  const prompt = document.getElementById("prompt").value;

  // ✅ THIS MUST BE INSIDE THE FUNCTION
  if (!prompt) {
    alert("Enter something first!");
    return;
  }

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ prompt }),
  });

  const data = await res.json();

  console.log("VIDEOS:", data.videos);

  videos = data.videos || [];
  currentIndex = 0;

  playNextVideo();
}
</script>

</body>
</html>
